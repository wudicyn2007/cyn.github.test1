<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习系统选择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 我在这里加了中文支持，修复所有乱码！ */
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 24px;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #1fb0f5;
            transform: translateY(-2px);
        }
        .title {
            font-size: 32px;
            margin-bottom: 50px;
            color: #38bdf8;
            text-align: center;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .card-box {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1100px;
        }
        .card {
            width: 300px;
            padding: 40px 25px;
            background: linear-gradient(145deg, #1e293b, #253349);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.05));
            opacity: 0;
            transition: 0.3s;
        }
        .card:hover::before {
            opacity: 1;
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .card h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }
        .card p {
            color: #94a3b8;
            font-size: 14px;
        }
        .blue { border-left: 6px solid #38bdf8; }
        .blue:hover { box-shadow: 0 20px 40px rgba(56, 189, 248, 0.2); }
        .purple { border-left: 6px solid #a78bfa; }
        .purple:hover { box-shadow: 0 20px 40px rgba(167, 139, 250, 0.2); }
        .green { border-left: 6px solid #34d399; }
        .green:hover { box-shadow: 0 20px 40px rgba(52, 211, 153, 0.2); }

        .footer-time {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(10px);
            text-align: center;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }
        .footer-time .date {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .footer-time .time {
            font-size: 28px;
            font-weight: 600;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            letter-spacing: 2px;
        }
        body {
            padding-bottom: 80px;
        }

        .ai-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }
        .ai-chat.active {
            display: flex;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-header {
            padding: 14px;
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
        }
        .chat-close:hover {
            color: #fff;
        }
        .chat-body {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        .chat-input {
            display: flex;
            border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            outline: none;
        }
        .chat-input button {
            padding: 0 16px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .ai-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 998;
            transition: transform 0.3s ease;
        }
        .ai-trigger:hover {
            transform: scale(1.1);
        }
        .ai-trigger.hidden {
            display: none;
        }
        .ai-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
        }
        .ai-trigger-text {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 12px;
            white-space: nowrap;
        }
        .msg {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
        }
        .user-msg {
            background: #2563eb;
            margin-left: auto;
        }
        .bot-msg {
            background: #0d9488;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .back-btn {
                position: static;
                margin-bottom: 30px;
            }
            body {
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回欢迎界面按钮 -->
    <a href="index.html" class="back-btn">← 返回欢迎界面</a>

    <h2 class="title">请选择学习系统</h2>

    <div class="card-box">
        <div class="card blue" onclick="window.location.href='computer_system.html'">
            <h3>计算机系统</h3>
            <p>汇编练习 | 结构学习 | 原理讲解</p>
        </div>

        <div class="card green" onclick="window.location.href='ai_history.html'">
            <h3>人工智能相关内容</h3>
            <p>发展历史 | 知识图谱</p>
        </div>
    </div>

    <!-- AI 聊天窗口 -->
    <div class="ai-chat" id="aiChat">
        <div class="chat-header">
            <span>AI 学习助手</span>
            <button class="chat-close" onclick="toggleAI()">×</button>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- AI 召唤按钮 -->
    <div class="ai-trigger" id="aiTrigger" onclick="toggleAI()">
        <div class="ai-icon">🤖</div>
        <span class="ai-trigger-text">点我召唤AI</span>
    </div>

    <div class="footer-time">
        <div class="date" id="footerDate"></div>
        <div class="time" id="footerTime"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('footerDate').textContent = dateStr;
            document.getElementById('footerTime').textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        function toggleAI() {
            const chat = document.getElementById('aiChat');
            const trigger = document.getElementById('aiTrigger');
            chat.classList.toggle('active');
            trigger.classList.toggle('hidden');
        }

        // 1. 本地问答库（降级备用）
        const qaList = [
            { q: "你好", a: "你好！我是你的学习助手，有什么问题可以问我~" },
            { q: "汇编", a: "汇编语言是一种低级语言，直接与硬件交互，和机器指令一一对应。" },
            { q: "Bomb Lab", a: "Bomb Lab是经典的逆向工程实验，通过反汇编找到正确输入来‘拆弹’。" },
            { q: "phase1", a: "phase1通常是字符串比较关卡，需要找到程序期望的特定字符串。" },
            { q: "计算机系统", a: "计算机系统由硬件、操作系统、编译器等多个层次组成。" },
            { q: "谢谢", a: "不客气！祝你学习顺利😊" }
        ];

        // 2. 尝试调用外部AI接口（这里用一个公开可用的接口，你也可以换成其他）
        const API_URL = "https://api.nihaoworld.com/api/chat";

        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";

            // 先尝试调用外部AI
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                if (res.ok) {
                    const data = await res.json();
                    addMsg(data.reply || "外部AI响应成功，但格式异常", "bot");
                    return; // 外部成功，结束流程
                } else {
                    throw new Error("外部接口失败");
                }
            } catch (err) {
                // 外部失败，自动降级到本地问答库
                let answer = "我目前只能回答汇编、计算机系统相关问题哦~";
                for (let item of qaList) {
                    if (text.includes(item.q)) {
                        answer = item.a;
                        break;
                    }
                }
                setTimeout(() => addMsg(answer, "bot"), 300);
            }
        }

        function addMsg(text, role) {
            const body = document.getElementById("chatBody");
            const div = document.createElement("div");
            div.className = "msg " + (role === "user" ? "user-msg" : "bot-msg");
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }
    </script>
</body>
</html>
