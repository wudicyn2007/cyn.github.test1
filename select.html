<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习系统选择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 24px;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #1fb0f5;
            transform: translateY(-2px);
        }
        .title {
            font-size: 32px;
            margin-bottom: 50px;
            color: #38bdf8;
            text-align: center;
        }
        .card-box {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1100px;
        }
        .card {
            width: 300px;
            padding: 40px 25px;
            background: #1e293b;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .card:hover {
            transform: translateY(-8px);
            background: #273449;
        }
        .card h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }
        .card p {
            color: #94a3b8;
            font-size: 14px;
        }
        .blue { border-left: 6px solid #38bdf8; }
        .purple { border-left: 6px solid #a78bfa; }
        .green { border-left: 6px solid #34d399; }

        /* AI 聊天窗口样式 */
        .ai-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
        }
        .chat-header {
            padding: 14px;
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            text-align: center;
        }
        .chat-body {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        .chat-input {
            display: flex;
            border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            outline: none;
        }
        .chat-input button {
            padding: 0 16px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .msg {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
        }
        .user-msg {
            background: #2563eb;
            margin-left: auto;
        }
        .bot-msg {
            background: #0d9488;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .back-btn {
                position: static;
                margin-bottom: 30px;
            }
            body {
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回欢迎界面按钮 -->
    <a href="index.html" class="back-btn">← 返回欢迎界面</a>

    <h2 class="title">请选择学习系统</h2>

    <div class="card-box">
        <div class="card blue" onclick="window.location.href='asm_checker.html'">
            <h3>汇编语言练习题</h3>
            <p>语法校验 | 学习辅助</p>
        </div>

        <div class="card purple" onclick="window.location.href='computer_structure.html'">
            <h3>计算机系统逻辑结构</h3>
            <p>结构学习 | 原理讲解</p>
        </div>

        <div class="card green" onclick="window.location.href='ai_history.html'">
            <h3>人工智能发展史</h3>
            <p>知识学习 | 发展历程</p>
        </div>
    </div>

    <!-- AI 聊天窗口 -->
    <div class="ai-chat">
        <div class="chat-header">AI 学习助手</div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="输入问题...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_URL = "https://api.deepseek.com/v1/chat/completions";
        const MODEL = "deepseek-chat";

        let messages = [{ role: "system", content: "你是一个计算机学习助手，耐心回答问题。" }];

        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";
            messages.push({ role: "user", content: text });

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + DEEPSEEK_KEY
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.3
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMsg(reply, "bot");
                messages.push({ role: "assistant", content: reply });
            } catch (err) {
                addMsg("AI 服务出错，请检查密钥或网络", "bot");
            }
        }

        function addMsg(text, role) {
            const body = document.getElementById("chatBody");
            const div = document.createElement("div");
            div.className = "msg " + (role === "user" ? "user-msg" : "bot-msg");
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }
    </script>
</body>
</html>
