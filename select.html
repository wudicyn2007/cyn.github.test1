<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习系统选择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 24px;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #1fb0f5;
            transform: translateY(-2px);
        }
        .title {
            font-size: 32px;
            margin-bottom: 50px;
            color: #38bdf8;
            text-align: center;
        }
        .card-box {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1100px;
        }
        .card {
            width: 300px;
            padding: 40px 25px;
            background: #1e293b;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .card:hover {
            transform: translateY(-8px);
            background: #273449;
        }
        .card h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }
        .card p {
            color: #94a3b8;
            font-size: 14px;
        }
        .blue { border-left: 6px solid #38bdf8; }
        .purple { border-left: 6px solid #a78bfa; }
        .green { border-left: 6px solid #34d399; }

        @media (max-width: 768px) {
            .back-btn {
                position: static;
                margin-bottom: 30px;
            }
            body {
                padding-top: 40px;
            }
        }

        /* ---------- AI 对话窗口样式 ---------- */
        .ai-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            height: 500px;
            background: #111827;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,255,255,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
            font-family: Consolas, monospace;
        }
        .chat-head {
            padding: 12px;
            background: #0f172a;
            color: #00e0ff;
            font-weight: bold;
            text-align: center;
        }
        .chat-body {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            color: #fff;
        }
        .chat-input {
            display: flex;
            border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #1e293b;
            color: #fff;
            border: none;
            outline: none;
        }
        .chat-input button {
            padding: 0 16px;
            background: #00e0ff;
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .msg {
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .user-msg {
            background: #2563eb;
            text-align: right;
        }
        .bot-msg {
            background: #0d9488;
            text-align: left;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← 返回欢迎界面</a>

    <h2 class="title">请选择学习系统</h2>

    <div class="card-box">
        <div class="card blue" onclick="window.location.href='asm_checker.html'">
            <h3>汇编语言练习题</h3>
            <p>语法校验 | 学习辅助</p>
        </div>

        <div class="card purple" onclick="window.location.href='computer_structure.html'">
            <h3>计算机系统逻辑结构</h3>
            <p>结构学习 | 原理讲解</p>
        </div>

        <div class="card green" onclick="window.location.href='ai_history.html'">
            <h3>人工智能发展史</h3>
            <p>知识学习 | 发展历程</p>
        </div>
    </div>

    <!-- ---------- AI 对话窗口 ---------- -->
    <div class="ai-chat">
        <div class="chat-head">AI 学习助手</div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
            <input id="chatInput" placeholder="输入问题...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ================== 你只需要填这两项 ==================
        const API_KEY = "sk-1db9d6195d0c43e8ae968d850f9ad1d1";
        const API_URL = "https://api.deepseek.com/chat/completions";
        // =====================================================

        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + API_KEY
                    },
                    body: JSON.stringify({
                        model: "gpt",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || "AI 回复失败";
                addMessage(reply, "bot");
            } catch (err) {
                addMessage("连接错误：" + err.message, "bot");
            }
        }

        function addMessage(text, role) {
            const body = document.getElementById("chatBody");
            const div = document.createElement("div");
            div.className = "msg " + (role === "user" ? "user-msg" : "bot-msg");
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }
    </script>

</body>
</html>
