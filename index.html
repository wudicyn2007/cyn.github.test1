<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segue UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .title {
            font-size: 36px;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 40px;
        }
        .enter-btn {
            padding: 14px 30px;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .enter-btn:hover {
            transform: translateY(-3px);
        }

        /* 更新日志按钮样式 */
        .log-btn {
            padding: 10px 20px;
            background: #a78bfa;
            color: #fff;
            border-radius: 20px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .log-btn:hover {
            background: #8b5cf6;
        }

        /* 弹出窗口背景 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* 日志内容框 */
        .log-content {
            background: #1e293b;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            color: #fff;
            text-align: left;
            position: relative;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        .log-title {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 22px;
            text-align: center;
        }

        .log-list {
            line-height: 1.8;
            font-size: 15px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <h1 class="title">欢迎使用学习助手</h1>
    <p class="desc">计算机学习一站式平台</p>

    <!-- 进入学习系统按钮 -->
    <button class="enter-btn" onclick="window.location.href='select.html'">
        进入学习助手
    </button>

    <!-- 查看更新日志按钮 -->
    <button class="log-btn" onclick="openLog()">查看更新日志</button>


    <!-- ====================== 更新日志弹窗 ====================== -->
    <div class="modal" id="logModal">
        <div class="log-content">
            <span class="close" onclick="closeLog()">×</span>
            <h2 class="log-title">📋 系统更新日志</h2>
            
            <div class="log-list">
                <!-- ============================================== -->
                <!-- ✅✅✅ 这里写你的中文更新日志 ✅✅✅ -->
                <!-- 想加几条就加几条，直接写中文 -->
                <!-- ============================================== -->

                <p>✅ V1.0.0 —— 系统正式上线</p>
                <p>✅ 新增汇编语言语法检测模块</p>
                <p>✅ 新增计算机系统逻辑结构学习</p>
                <p>✅ 新增人工智能发展史模块</p>
                <p>✅ 优化页面跳转，添加返回欢迎页按钮</p>
                <p>✅ 修复界面样式问题，适配手机/电脑</p>
                <p>✅ 支持公开访问，GitHub Pages 部署完成</p>

                <!-- 你可以继续往下加：
                <p>✅ V1.0.1 —— 修复XX问题</p>
                <p>✅ V1.0.2 —— 新增XX功能</p>
                -->

            </div>
        </div>
    </div>


    <script>
        // 打开日志
        function openLog() {
            document.getElementById("logModal").style.display = "flex";
        }
        // 关闭日志
        function closeLog() {
            document.getElementById("logModal").style.display = "none";
        }
    </script>

</body>
</html>
