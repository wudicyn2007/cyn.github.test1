<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习助手 - 欢迎页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.8),rgba(15,23,42,0.9)),
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .box {
            text-align: center;
            padding: 40px;
            animation: fade 1s;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            color: #38bdf8;
        }
        .desc {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 50px;
        }
        .btn {
            padding: 18px 50px;
            font-size: 20px;
            background: #38bdf8;
            color: #111;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #1fb0f5;
            transform: translateY(-3px);
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>欢迎使用学习助手</h1>
        <p class="desc">计算机学习一站式平台</p>
        <button class="btn" onclick="goToSelect()">进入学习助手</button>
    </div>

    <script>
        function goToSelect() {
            // 跳转到选择界面
            window.location.href = "select.html";
        }
    </script>
</body>
</html>
