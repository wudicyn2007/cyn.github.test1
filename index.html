<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 代码实时检测工具</title>
    <!-- 引入语法高亮和图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-okaidia.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Tailwind CSS 用于精美布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        error: '#dc2626',
                        warning: '#f59e0b',
                        success: '#16a34a',
                        dark: '#1e293b',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        code: ['Consolas', 'Monaco', 'Courier New', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .code-editor {
                @apply font-code bg-dark text-light rounded-lg p-4 h-full w-full resize-none border-2 border-gray-700 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all;
            }
            .error-card {
                @apply bg-error/10 border-l-4 border-error p-3 rounded-r-lg mb-2 animate-fadeIn;
            }
            .warning-card {
                @apply bg-warning/10 border-l-4 border-warning p-3 rounded-r-lg mb-2 animate-fadeIn;
            }
            .success-card {
                @apply bg-success/10 border-l-4 border-success p-3 rounded-r-lg mb-2 animate-fadeIn;
            }
            .animate-fadeIn {
                animation: fadeIn 0.3s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateX(10px); }
                to { opacity: 1; transform: translateX(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <!-- 页面头部 -->
    <header class="bg-white shadow-md py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-primary flex items-center">
                <i class="fa fa-code mr-3"></i>
                C++ 代码实时检测工具
            </h1>
            <div class="text-gray-500 text-sm">
                <i class="fa fa-info-circle mr-1"></i>
                输入代码，实时检测语法错误
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[80vh]">
            <!-- 左侧代码编辑区 -->
            <div class="flex flex-col h-full">
                <div class="flex items-center mb-3">
                    <i class="fa fa-edit text-primary mr-2"></i>
                    <h2 class="text-lg font-semibold text-gray-800">代码编辑区</h2>
                </div>
                <div class="relative flex-grow overflow-hidden">
                    <!-- 代码输入框 -->
                    <textarea id="cppCode" class="code-editor" placeholder="请输入C++代码，例如：
#include <iostream>
using namespace std;

int main() {
    cout << \"Hello World!\" << endl;
    return 0;
}">
</textarea>
                    <!-- 行号显示 -->
                    <div id="lineNumbers" class="absolute left-0 top-0 bottom-0 w-8 bg-gray-800 text-gray-400 text-xs pt-4 text-right pr-2 select-none"></div>
                </div>
            </div>

            <!-- 右侧错误提示区 -->
            <div class="flex flex-col h-full">
                <div class="flex items-center mb-3">
                    <i class="fa fa-exclamation-triangle text-warning mr-2"></i>
                    <h2 class="text-lg font-semibold text-gray-800">实时检测结果</h2>
                </div>
                <div id="errorContainer" class="flex-grow bg-white rounded-lg shadow-sm border border-gray-200 p-4 overflow-y-auto">
                    <!-- 初始提示 -->
                    <div class="text-gray-500 text-center py-8">
                        <i class="fa fa-lightbulb-o text-4xl mb-3 text-gray-300"></i>
                        <p>输入C++代码，错误信息将实时显示在这里</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-4 px-6 mt-8">
        <div class="container mx-auto text-center text-sm">
            <p>C++ 代码实时检测工具 | 部署于 GitHub Pages</p>
        </div>
    </footer>

    <!-- 核心脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
    <script>
        // 1. 行号生成功能
        const codeEditor = document.getElementById('cppCode');
        const lineNumbers = document.getElementById('lineNumbers');
        const errorContainer = document.getElementById('errorContainer');

        // 更新行号
        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n').length;
            let lineNumbersHTML = '';
            for (let i = 1; i <= lines; i++) {
                lineNumbersHTML += `${i}<br>`;
            }
            lineNumbers.innerHTML = lineNumbersHTML;
            // 调整输入框内边距，避免文字被行号遮挡
            codeEditor.style.paddingLeft = '3rem';
        }

        // 2. C++ 代码检测规则（覆盖常见语法错误）
        const cppCheckRules = [
            // 语法错误规则
            {
                type: 'error',
                regex: /#include\s+<([a-zA-Z0-9_]+)>/g,
                validate: (match, content) => {
                    const validHeaders = ['iostream', 'string', 'vector', 'map', 'set', 'algorithm', 'cmath', 'cstdio'];
                    const header = match[1];
                    if (!validHeaders.includes(header) && !header.endsWith('.h')) {
                        return `未知的头文件: ${header}，可能是拼写错误`;
                    }
                    return null;
                }
            },
            {
                type: 'error',
                regex: /cout|cin/g,
                validate: (match, content) => {
                    if (!content.includes('using namespace std;') && !content.includes('std::')) {
                        return `使用${match[0]}前未声明std命名空间，请添加 using namespace std; 或使用 std::${match[0]}`;
                    }
                    return null;
                }
            },
            {
                type: 'error',
                regex: /\{[^}]*$/g,
                validate: (match, content) => {
                    const openBrackets = (content.match(/{/g) || []).length;
                    const closeBrackets = (content.match(/}/g) || []).length;
                    if (openBrackets > closeBrackets) {
                        return `存在未闭合的大括号，当前开括号: ${openBrackets}，闭括号: ${closeBrackets}`;
                    }
                    return null;
                }
            },
            {
                type: 'error',
                regex: /;\s*$/gm,
                validate: (match, content, line, lineNum) => {
                    // 检查行尾是否缺少分号（排除注释、字符串、函数定义行）
                    const trimmedLine = line.trim();
                    if (!trimmedLine.endsWith(';') && 
                        !trimmedLine.endsWith('{') && 
                        !trimmedLine.endsWith('}') && 
                        !trimmedLine.startsWith('//') && 
                        !trimmedLine.includes('/*') && 
                        !trimmedLine.includes('"') &&
                        !trimmedLine.includes('main(') &&
                        !trimmedLine.includes('if(') &&
                        !trimmedLine.includes('for(') &&
                        !trimmedLine.includes('while(') &&
                        trimmedLine !== '') {
                        return `第 ${lineNum} 行末尾缺少分号`;
                    }
                    return null;
                }
            },
            {
                type: 'error',
                regex: /return\s+([0-9]+);/g,
                validate: (match, content) => {
                    if (content.includes('int main()') && match[1] !== '0') {
                        return `main函数建议返回0，当前返回值: ${match[1]}`;
                    }
                    return null;
                }
            },
            // 警告规则
            {
                type: 'warning',
                regex: /using namespace std;/g,
                validate: () => {
                    return '不建议全局使用std命名空间，可能导致命名冲突（仅警告）';
                }
            },
            {
                type: 'warning',
                regex: /cout\s+<<\s+[^;]+$/gm,
                validate: (match, line, lineNum) => {
                    if (line.includes('endl') && !content.includes('#include <iostream>')) {
                        return `第 ${lineNum} 行使用endl但未包含iostream头文件`;
                    }
                    return null;
                }
            }
        ];

        // 3. 核心检测函数
        function checkCppCode() {
            const code = codeEditor.value.trim();
            let errors = [];
            let warnings = [];

            // 空内容处理
            if (!code) {
                errorContainer.innerHTML = `
                    <div class="text-gray-500 text-center py-8">
                        <i class="fa fa-lightbulb-o text-4xl mb-3 text-gray-300"></i>
                        <p>输入C++代码，错误信息将实时显示在这里</p>
                    </div>
                `;
                return;
            }

            // 逐行检测
            const lines = code.split('\n');
            lines.forEach((line, lineNum) => {
                cppCheckRules.forEach(rule => {
                    const matches = line.match(rule.regex);
                    if (matches) {
                        const message = rule.validate(matches, code, line, lineNum + 1);
                        if (message) {
                            if (rule.type === 'error') {
                                errors.push(message);
                            } else {
                                warnings.push(message);
                            }
                        }
                    }
                });
            });

            // 生成检测结果HTML
            let resultHTML = '';
            
            // 显示错误
            if (errors.length > 0) {
                resultHTML += `<div class="mb-4"><span class="font-semibold text-error"><i class="fa fa-times-circle mr-1"></i> 语法错误 (${errors.length})</span></div>`;
                errors.forEach(error => {
                    resultHTML += `
                        <div class="error-card">
                            <div class="flex items-start">
                                <i class="fa fa-exclamation-circle text-error mt-1 mr-2"></i>
                                <p>${error}</p>
                            </div>
                        </div>
                    `;
                });
            }

            // 显示警告
            if (warnings.length > 0) {
                resultHTML += `<div class="mb-4 mt-4"><span class="font-semibold text-warning"><i class="fa fa-exclamation-circle mr-1"></i> 代码警告 (${warnings.length})</span></div>`;
                warnings.forEach(warning => {
                    resultHTML += `
                        <div class="warning-card">
                            <div class="flex items-start">
                                <i class="fa fa-warning text-warning mt-1 mr-2"></i>
                                <p>${warning}</p>
                            </div>
                        </div>
                    `;
                });
            }

            // 无错误时显示成功提示
            if (errors.length === 0 && warnings.length === 0) {
                resultHTML += `
                    <div class="success-card text-center py-8">
                        <i class="fa fa-check-circle text-success text-4xl mb-3"></i>
                        <p class="text-success font-semibold">代码检测通过！未发现语法错误</p>
                        <p class="text-gray-600 text-sm mt-2">当前代码符合基础C++语法规范</p>
                    </div>
                `;
            }

            errorContainer.innerHTML = resultHTML;
        }

        // 4. 绑定事件
        // 输入时实时检测
        codeEditor.addEventListener('input', () => {
            updateLineNumbers();
            // 防抖处理，避免频繁检测
            clearTimeout(window.checkTimeout);
            window.checkTimeout = setTimeout(checkCppCode, 300);
        });

        // 页面加载初始化
        window.addEventListener('load', () => {
            updateLineNumbers();
            checkCppCode();
            // 聚焦输入框
            codeEditor.focus();
        });

        // 调整窗口大小时更新行号
        window.addEventListener('resize', updateLineNumbers);
    </script>
</body>
</html>
