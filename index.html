<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简易学习平台示例</title>
  <style>
    button {margin: 5px;}
    .section {border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;}
  </style>
</head>
<body>
  <h2>简易学习平台</h2>
  <div class="section">
    <button>知识图谱</button>
    <button>进化史</button>
  </div>
  <div class="section">
    <span>回归</span>
    <span>分类</span>
    <span>神经网络</span>
  </div>
  <div class="section">
    <button>线性回归</button>
    <button>逻辑回归</button>
  </div>
</body>
</html>
