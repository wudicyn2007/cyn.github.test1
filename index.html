<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #161d31;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .title {
            font-size: 36px;
            color: #60b5ff;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #c9d1e8;
            margin-bottom: 40px;
        }
        .input-area {
            margin-bottom: 24px;
        }
        .input-area input {
            width: 240px;
            font-size: 18px;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid #60b5ff;
            outline: none;
            padding: 8px 0;
            text-align: center;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 12px 36px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn.primary {
            background: #60b5ff;
            color: #161d31;
        }
        .btn.primary:hover {
            background: #49a6f7;
            transform: translateY(-2px);
        }
        .btn.secondary {
            background: #a78bfa;
            color: #161d31;
        }
        .btn.secondary:hover {
            background: #9367f5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1 class="title">欢迎使用学习助手</h1>
    <p class="subtitle">计算机学习一站式平台</p>

    <div class="input-area">
        <input type="text" id="username" placeholder="请输入用户名">
    </div>

    <div class="btn-group">
        <button class="btn primary" onclick="go()">进入学习系统</button>
        <button class="btn secondary" onclick="alert('更新日志：\n- 新增AI学习助手\n- 界面优化升级')">查看更新日志</button>
    </div>

    <script>
        function go() {
            let name = document.getElementById("username").value.trim();
            if (name === "") {
                alert("请输入用户名再进入哦~");
                return;
            }
            // 直接跳转到系统选择页
            window.location.href = "select.html";
        }
    </script>
</body>
</html>
