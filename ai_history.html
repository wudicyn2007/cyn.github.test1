<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人工智能发展史 · 进化与知识图谱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:20px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}
.back-btn{display:inline-block;padding:8px 20px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#0f172a;border-radius:30px;text-decoration:none;font-weight:600;margin-bottom:20px;transition:all 0.3s}
.back-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(56,189,248,0.4)}
h1{background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:20px;font-size:28px;font-weight:700}

.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.tab{padding:10px 28px;background:#1e293b;border-radius:25px;cursor:pointer;font-weight:500;transition:all 0.3s;border:2px solid transparent}
.tab:hover{border-color:#38bdf8}
.tab.active{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#0f172a;font-weight:600}

.tab-content{display:none;background:rgba(30,41,59,0.8);backdrop-filter:blur(10px);border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,0.1)}
.tab-content.active{display:block}

.timeline-container{position:relative;width:100%;height:680px;background:linear-gradient(180deg,#0f172a,#1a2744);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.timeline-bg{position:absolute;width:100%;height:100%;background-image:radial-gradient(circle at 20% 30%,rgba(56,189,248,0.1) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(167,139,250,0.1) 0%,transparent 50%)}
.svg-wrapper{width:100%;height:100%;position:relative;z-index:1}

.node{stroke-width:2.5;rx:14;ry:14;cursor:move;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));transition:all 0.3s}
.node:hover{filter:drop-shadow(0 6px 16px rgba(0,0,0,0.5));transform:scale(1.05)}
.node-regression{fill:url(#gradRegression);stroke:#38bdf8}
.node-classification{fill:url(#gradClassification);stroke:#a78bfa}
.node-neural{fill:url(#gradNeural);stroke:#f472b6}
.node-clustering{fill:url(#gradClustering);stroke:#34d399}
.node-dim{fill:url(#gradDim);stroke:#fbbf24}
.node-rl{fill:url(#gradRL);stroke:#fb923c}
.node-text{fill:#fff;font-size:12px;text-anchor:middle;font-weight:600}
.node-year{fill:rgba(255,255,255,0.7);font-size:10px;text-anchor:middle}
.edge{stroke-width:2;fill:none;opacity:0.6}

.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.knowledge-card{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s;position:relative;overflow:hidden}
.knowledge-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.knowledge-card.regression::before{background:linear-gradient(180deg,#38bdf8,#0ea5e9)}
.knowledge-card.classification::before{background:linear-gradient(180deg,#a78bfa,#818cf8)}
.knowledge-card.neural::before{background:linear-gradient(180deg,#f472b6,#ec4899)}
.knowledge-card.clustering::before{background:linear-gradient(180deg,#34d399,#10b981)}
.knowledge-card.dimensionality::before{background:linear-gradient(180deg,#fbbf24,#f59e0b)}
.knowledge-card.rl::before{background:linear-gradient(180deg,#fb923c,#f97316)}
.knowledge-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.2)}
.knowledge-card h3{font-size:15px;color:#fff;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:8px}
.knowledge-card h3 .icon{font-size:18px}
.level-bar{height:20px;background:#1e293b;border-radius:10px;overflow:hidden;margin-top:8px}
.level-fill{height:100%;border-radius:10px;color:#fff;font-size:11px;display:flex;align-items:center;padding-left:10px;font-weight:500}
.level-basic{background:linear-gradient(90deg,#38bdf8,#0ea5e9)}
.level-intermediate{background:linear-gradient(90deg,#a78bfa,#818cf8)}
.level-advanced{background:linear-gradient(90deg,#f472b6,#ec4899)}
.level-expert{background:linear-gradient(90deg,#fbbf24,#f59e0b)}

.legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:16px;padding:12px;background:rgba(15,23,42,0.6);border-radius:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px}
.legend-dot{width:12px;height:12px;border-radius:50%}
.legend-dot.regression{background:#38bdf8}
.legend-dot.classification{background:#a78bfa}
.legend-dot.neural{background:#f472b6}
.legend-dot.clustering{background:#34d399}
.legend-dot.dimensionality{background:#fbbf24}
.legend-dot.rl{background:#fb923c}
</style>
</head>

<script>
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.tab-content');
tabs[0].onclick = ()=>{show('know')}
tabs[1].onclick = ()=>{show('evo')}
function show(t){
    contents.forEach(c=>c.classList.remove('active'))
    tabs.forEach(t=>t.classList.remove('active'))
    if(t==='know'){document.getElementById('knowledge-tab').classList.add('active');tabs[0].classList.add('active')}
    else{document.getElementById('evolution-tab').classList.add('active');tabs[1].classList.add('active')}
}

const nodeColors = {
    'n1':'#38bdf8','n2':'#38bdf8','n3':'#38bdf8','n4':'#38bdf8',
    'n5':'#a78bfa','n6':'#a78bfa','n7':'#a78bfa','n8':'#a78bfa',
    'n9':'#f472b6','n10':'#f472b6','n11':'#f472b6','n12':'#f472b6',
    'n13':'#fbbf24','n14':'#fbbf24','n15':'#fbbf24',
    'n16':'#34d399','n17':'#34d399',
    'n18':'#fb923c'
};

const connections = [
  { e: 'e1', from: 'n1', to: 'n2' },
  { e: 'e2', from: 'n1', to: 'n3' },
  { e: 'e3', from: 'n3', to: 'n4' },
  { e: 'e4', from: 'n1', to: 'n5' },
  { e: 'e5', from: 'n5', to: 'n6' },
  { e: 'e6', from: 'n5', to: 'n7' },
  { e: 'e7', from: 'n7', to: 'n8' },
  { e: 'e8', from: 'n9', to: 'n10' },
  { e: 'e9', from: 'n10', to: 'n11' },
  { e: 'e10', from: 'n11', to: 'n12' },
  { e: 'e11', from: 'n13', to: 'n14' },
];

function createEdges() {
    const edgesGroup = document.getElementById('edges');
    edgesGroup.innerHTML = '';
    connections.forEach(c => {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('id', c.e);
        line.setAttribute('stroke-width', '2');
        line.setAttribute('opacity', '0.5');
        edgesGroup.appendChild(line);
    });
}

function updateEdges() {
    connections.forEach(c => {
        const from = document.querySelector(`[data-id="${c.from}"]`);
        const to = document.querySelector(`[data-id="${c.to}"]`);
        const edge = document.getElementById(c.e);
        if (!from || !to || !edge) return;

        const mFrom = from.transform.baseVal[0].matrix;
        const mTo = to.transform.baseVal[0].matrix;

        edge.setAttribute('x1', mFrom.e);
        edge.setAttribute('y1', mFrom.f);
        edge.setAttribute('x2', mTo.e);
        edge.setAttribute('y2', mTo.f);
        edge.setAttribute('stroke', nodeColors[c.from]);
    });
}

let drag = null, dx=0, dy=0;
document.querySelectorAll('.draggable').forEach(g=>{
  g.onmousedown = e=>{
    drag = g;
    const t = g.transform.baseVal[0].matrix;
    dx = e.clientX - t.e;
    dy = e.clientY - t.f;
  }
});

document.onmousemove = e=>{
  if (!drag) return;
  const x = e.clientX - dx;
  const y = e.clientY - dy;
  drag.setAttribute('transform', `translate(${x},${y})`);
  updateEdges();
};

document.onmouseup = ()=>{ drag=null; }
window.onload = ()=>{ createEdges(); updateEdges(); };
</script>
</body>
