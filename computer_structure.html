<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机系统逻辑结构</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:20px}
.container{max-width:1200px;margin:0 auto}
.back-btn{display:inline-block;padding:8px 20px;background:#38bdf8;color:#0f172a;border-radius:30px;text-decoration:none;font-weight:600;margin-bottom:20px}
h1{color:#38bdf8;text-align:center;margin-bottom:20px;font-size:24px}

.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.tab{padding:10px 24px;background:#1e293b;border-radius:10px;cursor:pointer}
.tab.active{background:#3b82f6}

.tab-content{display:none;background:#1e293b;border-radius:16px;padding:24px}
.tab-content.active{display:block}

.timeline-container{position:relative;width:100%;height:650px;background:#0f172a;border-radius:12px;overflow:hidden}
.svg-wrapper{width:100%;height:100%}

.node{fill:#1e293b;stroke:#38bdf8;stroke-width:2;rx:12;ry:12;cursor:move}
.node-text{fill:#fff;font-size:12px;text-anchor:middle}
.edge{stroke:#64748b;stroke-width:1.5;fill:none}

.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.knowledge-card{background:#0f172a;border-radius:10px;padding:12px;border-left:3px solid #38bdf8}
.knowledge-card h3{font-size:14px;color:#fff;margin-bottom:6px}
.level-bar{height:18px;background:#334155;border-radius:9px;overflow:hidden}
.level-fill{height:100%;background:#38bdf8;color:#fff;font-size:11px;display:flex;align-items:center;padding-left:8px}
</style>
</head>

<body>
<div class="container">
<a href="select.html" class="back-btn">← 返回选择页</a>
<h1>计算机系统逻辑结构</h1>

<div class="tabs">
<div class="tab" id="tab-know">知识图谱</div>
<div class="tab active" id="tab-evo">逻辑结构图</div>
</div>

<div class="tab-content active" id="evolution-tab">
<div class="timeline-container">
<svg class="svg-wrapper" viewBox="0 0 1000 650">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
<polygon points="0 0,8 2.5,0 5" fill="#64748b"/>
</marker>
</defs>

<g id="edges">
<line class="edge" id="e1" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e2" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e3" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e4" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e5" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e6" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e7" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e8" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e9" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
<line class="edge" id="e10" x1="" y1="" x2="" y2="" marker-end="url(#arrow)"/>
</g>

<g id="nodes">

<!-- 核心节点（放大） -->
<g class="draggable" data-id="n1" transform="translate(500,100)">
<rect class="node" width="120" height="50" x="-60" y="-25"/>
<text class="node-text" x="0" y="5">计算机系统</text>
</g>

<g class="draggable" data-id="n2" transform="translate(300,220)">
<rect class="node" width="100" height="45" x="-50" y="-22"/>
<text class="node-text" x="0" y="5">硬件系统</text>
</g>

<g class="draggable" data-id="n3" transform="translate(700,220)">
<rect class="node" width="100" height="45" x="-50" y="-22"/>
<text class="node-text" x="0" y="5">软件系统</text>
</g>

<!-- 硬件子节点（无遮挡） -->
<g class="draggable" data-id="n4" transform="translate(150,350)">
<rect class="node" width="90" height="40" x="-45" y="-20"/>
<text class="node-text" x="0" y="5">运算器</text>
</g>

<g class="draggable" data-id="n5" transform="translate(270,350)">
<rect class="node" width="90" height="40" x="-45" y="-20"/>
<text class="node-text" x="0" y="5">控制器</text>
</g>

<g class="draggable" data-id="n6" transform="translate(390,350)">
<rect class="node" width="90" height="40" x="-45" y="-20"/>
<text class="node-text" x="0" y="5">存储器</text>
</g>

<g class="draggable" data-id="n7" transform="translate(510,350)">
<rect class="node" width="90" height="40" x="-45" y="-20"/>
<text class="node-text" x="0" y="5">输入设备</text>
</g>

<g class="draggable" data-id="n8" transform="translate(630,350)">
<rect class="node" width="90" height="40" x="-45" y="-20"/>
<text class="node-text" x="0" y="5">输出设备</text>
</g>

<!-- 软件子节点（无遮挡） -->
<g class="draggable" data-id="n9" transform="translate(650,350)">
<rect class="node" width="100" height="45" x="-50" y="-22"/>
<text class="node-text" x="0" y="5">系统软件</text>
</g>

<g class="draggable" data-id="n10" transform="translate(800,350)">
<rect class="node" width="100" height="45" x="-50" y="-22"/>
<text class="node-text" x="0" y="5">应用软件</text>
</g>

</g>
</svg>
</div>
</div>

<div class="tab-content" id="knowledge-tab">
<div class="knowledge-grid">

<div class="knowledge-card"><h3>计算机系统</h3><div class="level-bar"><div class="level-fill" style="width:100%">核心</div></div></div>
<div class="knowledge-card"><h3>硬件系统</h3><div class="level-bar"><div class="level-fill" style="width:80%">核心</div></div></div>
<div class="knowledge-card"><h3>软件系统</h3><div class="level-bar"><div class="level-fill" style="width:80%">核心</div></div></div>
<div class="knowledge-card"><h3>运算器</h3><div class="level-bar"><div class="level-fill" style="width:60%">重要</div></div></div>
<div class="knowledge-card"><h3>控制器</h3><div class="level-bar"><div class="level-fill" style="width:60%">重要</div></div></div>
<div class="knowledge-card"><h3>存储器</h3><div class="level-bar"><div class="level-fill" style="width:60%">重要</div></div></div>
<div class="knowledge-card"><h3>输入设备</h3><div class="level-bar"><div class="level-fill" style="width:40%">基础</div></div></div>
<div class="knowledge-card"><h3>输出设备</h3><div class="level-bar"><div class="level-fill" style="width:40%">基础</div></div></div>
<div class="knowledge-card"><h3>系统软件</h3><div class="level-bar"><div class="level-fill" style="width:60%">重要</div></div></div>
<div class="knowledge-card"><h3>应用软件</h3><div class="level-bar"><div class="level-fill" style="width:40%">基础</div></div></div>

</div>
</div>

</div>

<script>
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.tab-content');
tabs[0].onclick = ()=>{show('know')}
tabs[1].onclick = ()=>{show('evo')}
function show(t){
    contents.forEach(c=>c.classList.remove('active'))
    tabs.forEach(t=>t.classList.remove('active'))
    if(t==='know'){document.getElementById('knowledge-tab').classList.add('active');tabs[0].classList.add('active')}
    else{document.getElementById('evolution-tab').classList.add('active');tabs[1].classList.add('active')}
}

// 完整逻辑连线（所有节点全连接，无遗漏）
const connections = [
  { e:'e1', from:'n1', to:'n2' },
  { e:'e2', from:'n1', to:'n3' },
  { e:'e3', from:'n2', to:'n4' },
  { e:'e4', from:'n2', to:'n5' },
  { e:'e5', from:'n2', to:'n6' },
  { e:'e6', from:'n2', to:'n7' },
  { e:'e7', from:'n2', to:'n8' },
  { e:'e8', from:'n3', to:'n9' },
  { e:'e9', from:'n3', to:'n10'},
  { e:'e10', from:'n9', to:'n10'}
];

function updateEdges() {
  connections.forEach(c => {
    const from = document.querySelector(`[data-id="${c.from}"]`);
    const to = document.querySelector(`[data-id="${c.to}"]`);
    const edge = document.getElementById(c.e);
    if (!from || !to || !edge) return;
    const mf = from.transform.baseVal[0].matrix;
    const mt = to.transform.baseVal[0].matrix;
    edge.setAttribute('x1', mf.e);
    edge.setAttribute('y1', mf.f);
    edge.setAttribute('x2', mt.e);
    edge.setAttribute('y2', mt.f);
  });
}

let drag = null, dx=0, dy=0;
document.querySelectorAll('.draggable').forEach(g=>{
  g.onmousedown = e=>{
    drag = g;
    const t = g.transform.baseVal[0].matrix;
    dx = e.clientX - t.e;
    dy = e.clientY - t.f;
  }
});

document.onmousemove = e=>{
  if(!drag) return;
  const x = e.clientX - dx;
  const y = e.clientY - dy;
  drag.setAttribute('transform',`translate(${x},${y})`);
  updateEdges();
}

document.onmouseup = ()=>{drag=null}
window.onload = updateEdges;
</script>
</body>
</html>
