<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>炸弹实验室模拟器</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: monospace; }
        .terminal {
            background: #000;
            width: 90%;
            height: 500px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid #00ff00;
            overflow-y: auto;
        }
        input {
            width: 90%;
            margin: 0 auto;
            display: block;
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            font-size: 14px;
        }
        .line { margin: 4px 0; }
        .error { color: #ff3333; }
        .asm { color: #66ff66; }
    </style>
</head>
<body>
    <div class="terminal" id="term"></div>
    <input type="text" id="input" placeholder="输入命令，如 disas phase_1、x/s 0x402400、run...">

    <script>
        const term = document.getElementById('term');
        const input = document.getElementById('input');
        let history = '';

        // 答案数据
        const answers = {
            "0x402400": "Border relations with Canada have never been better.",
            "0x40245e": "flyers",
            "0x4024b0": "maduiersnfotvbylSo you think you can stop the bomb with ctrl-c, do you?"
        };

        // 汇编代码
        const asm = {
"phase_1": `Dump of assembler code for function phase_1:
   0x0000000000400ee0 <+0>:     sub    $0x8,%rsp
   0x0000000000400ee4 <+4>:     mov    $0x402400,%esi
   0x0000000000400ee9 <+9>:     call   0x401338 <strings_not_equal>
   0x0000000000400eee <+14>:    test   %eax,%eax
   0x0000000000400ef0 <+16>:    je     0x400ef7 <phase_1+23>
   0x0000000000400ef2 <+18>:    call   0x40143a <explode_bomb>
   0x0000000000400ef7 <+23>:    add    $0x8,%rsp
   0x0000000000400efb <+27>:    ret`
};

        function print(msg, cls = '') {
            history += `<div class="line ${cls}">${msg}</div>`;
            term.innerHTML = history;
            term.scrollTop = term.scrollHeight;
        }

        function runCommand(cmd) {
            print(`(gdb) ${cmd}`);
            cmd = cmd.trim();

            // 1. 查看内存字符串 x/s
            if (cmd.startsWith("x/s ")) {
                let addr = cmd.split(" ")[1];
                if (answers[addr]) {
                    print(`${addr}:   "${answers[addr]}"`);
                } else {
                    print("Cannot access memory at address " + addr, "error");
                }
                return;
            }

            // 2. 反汇编
            if (cmd === "disas phase_1") {
                print(asm.phase_1, "asm");
                return;
            }

            // 3. 运行
            if (cmd === "run") {
                print("Welcome to my fiendish little bomb. You have 6 phases with");
                print("which to blow yourself up. Have a nice day!");
                return;
            }

            // 4. 断点
            if (cmd.startsWith("break")) {
                print("Breakpoint set at " + cmd.split(" ")[1]);
                return;
            }

            // 未知命令
            print("Undefined command: \"" + cmd + "\". Try \"help\".", "error");
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                runCommand(input.value);
                input.value = '';
            }
        });

        print("欢迎使用 炸弹实验室 模拟器");
        print("支持命令：");
        print("disas phase_1    —— 查看第一关汇编（分行显示）");
        print("x/s 0x402400     —— 查看第一关答案");
        print("run              —— 运行炸弹");
        print("break phase_1    —— 设置断点");
        print("---------------------------------------");
    </script>
</body>
</html>
